name: Request Copilot review for Dependabot PRs

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  request-copilot-review:
    if: >
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Request Copilot as reviewer
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number,
                reviewers: ["copilot"]
              });
              core.info("Requested @copilot review successfully.");
            } catch (error) {
              // Don't fail if reviewer is already requested or cannot be re-requested.
              core.warning(`Could not request @copilot (continuing): ${error.message}`);
            }
