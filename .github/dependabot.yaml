# Keep GitHub Actions reasonably current.
# For Python/uv dependencies:
# - allow GitHub security update PRs immediately via Dependabot alerts
# - do one general maintenance pass per month
# - keep churn low by allowing at most one open uv PR at a time
version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      uv:
        patterns:
          - "*"
